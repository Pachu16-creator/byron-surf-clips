<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Byron Surf Clips</title>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="view-sessions">
            <div id="admin-panel" class="hidden bg-white p-6 rounded-2xl mb-10 border-2 border-dashed border-blue-200">
                <h2 class="font-bold mb-4">Nueva Sesión</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="loc" placeholder="Ubicación" class="border p-2 rounded-lg">
                    <input type="date" id="date" class="border p-2 rounded-lg">
                    <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg">Publicar</button>
                </div>
            </div>
            <div id="sessions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-4 text-blue-600 font-bold">← Volver</button>
            <div id="admin-upload" class="hidden mb-10 bg-blue-50 p-6 rounded-2xl text-center border-2 border-dashed border-blue-200">
                <input type="file" id="bulk-upload" multiple onchange="handleBulkUpload(event)">
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let currentSessionId = null;

        // Función de subida a carpetas
        async function handleBulkUpload(event) {
            const files = event.target.files;
            if (!files.length || !currentSessionId) return;
            alert("Subiendo fotos a carpetas...");
            
            for (let file of files) {
                const cleanName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
                const pathOriginal = `originals/${cleanName}`;
                const pathWatermarked = `watermarked/${cleanName}`;

                await client.storage.from('clips').upload(pathOriginal, file);
                await client.storage.from('clips').upload(pathWatermarked, file);

                const urlOrig = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${pathOriginal}`;
                const urlWm = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${pathWatermarked}`;

                await client.from('photos').insert([{ session_id: currentSessionId, url_original: urlOrig, url_watermarked: urlWm }]);
            }
            loadPhotos();
        }

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";
            
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative aspect-square rounded-xl overflow-hidden">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-40 pointer-events-none">
                    <button onclick="window.open('https://stripe.com', '_blank')" class="absolute bottom-2 left-2 right-2 bg-white/90 py-2 rounded-lg text-xs font-bold shadow-lg">COMPRAR</button>
                </div>
            `).join('');
        }

        async function createSession() { /* Tu lógica de creación */ location.reload(); }
        async function showSessions() { document.getElementById('view-sessions').classList.remove('hidden'); document.getElementById('view-gallery').classList.add('hidden'); }
    </script>
</body>
</html>
