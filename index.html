<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <section id="landing-page" class="h-screen flex flex-col items-center justify-center text-center p-6 bg-blue-900 text-white">
        <h1 class="text-6xl font-black italic mb-6 tracking-tighter">BYRON SURF CLIPS</h1>
        <p class="text-xl mb-10 max-w-lg opacity-90">Capturando los mejores momentos en el agua. Encuentra tu sesión y elige tus clips favoritos.</p>
        <button onclick="goToSessions()" class="bg-white text-blue-900 px-10 py-4 rounded-full font-bold text-lg hover:bg-blue-50 transition">Ver Sesiones</button>
    </section>

    <section id="sessions-page" class="hidden">
        <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl sticky top-0 z-40">
            <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <button onclick="toggleCartModal()" class="font-bold">🛒 Cart (<span id="cart-count">0</span>)</button>
        </nav>

        <main class="max-w-6xl mx-auto p-4">
            <section class="bg-white p-4 rounded-2xl shadow-sm mb-8 flex gap-4">
                <input type="text" id="filter-loc" placeholder="Ubicación..." class="border p-2 rounded-lg flex-1" onkeyup="filterSessions()">
                <input type="date" id="filter-date" class="border p-2 rounded-lg" onchange="filterSessions()">
            </section>

            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            
            <div id="view-gallery" class="hidden">
                <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold">← Volver</button>
                <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </main>
    </section>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-4 text-white text-5xl">❮</button>
        <div class="relative"><img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-lg"></div>
        <button onclick="nextPhoto()" class="absolute right-4 text-white text-5xl">❯</button>
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-3xl">✕</button>
    </div>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let sessions = [], cart = [], currentPhotos = [], currentIndex = 0;
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";

        function goToSessions() { document.getElementById('landing-page').classList.add('hidden'); document.getElementById('sessions-page').classList.remove('hidden'); loadSessions(); }
        function backToHome() { document.getElementById('landing-page').classList.remove('hidden'); document.getElementById('sessions-page').classList.add('hidden'); }

        async function loadSessions() { 
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false }); 
            sessions = data || []; renderSessions(sessions);
        }

        function renderSessions(list) {
            document.getElementById('sessions-grid').innerHTML = list.map(s => `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border cursor-pointer" onclick="openGallery('${s.id}', '${s.location}')">
                    <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-48 object-cover">
                    <div class="p-5"><h3 class="font-black text-xl">${s.location}</h3><p class="text-blue-600 text-sm font-bold">${s.time_range || ''}</p><p class="text-gray-500 text-sm">${s.date || ''}</p></div>
                </div>`).join('');
        }

        function filterSessions() {
            const loc = document.getElementById('filter-loc').value.toLowerCase();
            const date = document.getElementById('filter-date').value;
            renderSessions(sessions.filter(s => s.location.toLowerCase().includes(loc) && (!date || s.date === date)));
        }

        function openGallery(id, title) { 
            currentSessionId = id; document.getElementById('sessions-grid').classList.add('hidden'); 
            document.getElementById('view-gallery').classList.remove('hidden'); 
            document.getElementById('gallery-header').innerText = title; loadPhotos(); 
        }

        async function loadPhotos() { 
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId); 
            currentPhotos = data || []; 
            document.getElementById('photos-grid').innerHTML = currentPhotos.map((p, i) => `
                <div class="relative rounded-2xl overflow-hidden aspect-square border">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox(${i})">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                    <input type="checkbox" class="absolute top-3 left-3 w-6 h-6 z-10" onchange="toggleCart('${p.url_watermarked}', this)">
                </div>`).join(''); 
        }

        // LIGHTBOX
        function openLightbox(i) { currentIndex = i; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; document.getElementById('lightbox').classList.remove('hidden'); }
        function nextPhoto() { currentIndex = (currentIndex + 1) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function prevPhoto() { currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        
        // CHECKOUT
        async function checkout() { 
            const response = await fetch('https://gmyptbfrpspzmyucqumz.supabase.co/functions/v1/swift-api', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU' }, 
                body: JSON.stringify({ photos: cart }) 
            });
            const data = await response.json();
            if (data.url) window.location.href = data.url; 
        }
        function toggleCart(url, cb) { if (cb.checked) cart.push(url); else cart = cart.filter(i => i !== url); document.getElementById('cart-count').innerText = cart.length; }
        function showSessions() { location.reload(); }
    </script>
</body>
</html>
