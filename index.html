<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white p-4 shadow-sm flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl">
        <h1 class="font-black italic text-xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui" class="flex items-center"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="view-sessions">
            <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
                <h2 class="font-bold mb-4">Crear Nueva Sesión</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="loc" placeholder="Ubicación" class="border p-2 rounded-lg">
                    <input type="text" id="time" placeholder="Horario" class="border p-2 rounded-lg">
                    <input type="date" id="date" class="border p-2 rounded-lg">
                    <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg">Publicar</button>
                </div>
            </section>
            <div id="sessions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-4 text-blue-600 font-bold">← Volver</button>
            <div id="gallery-header" class="mb-8"></div>
            <div id="admin-upload" class="hidden bg-blue-50 p-6 rounded-2xl mb-8 text-center border-2 border-blue-200">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Subir Fotos</label>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false;

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            isAdmin = (user?.email === "wildpauu@gmail.com");
            
            if (isAdmin) {
                document.getElementById('auth-ui').innerHTML = `<button onclick="client.auth.signOut(); location.reload()" class="text-xs text-red-500 underline">Salir (Admin)</button>`;
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                document.getElementById('auth-ui').innerHTML = `<button onclick="login()" class="text-xs bg-gray-200 px-3 py-1 rounded">Login</button>`;
            }
            loadSessions();
        }

        async function login() {
            const email = prompt("Email:");
            await client.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
            alert("Enlace enviado.");
        }

        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            // Separamos la zona clicable (div) de la zona administrativa (label)
            document.getElementById('sessions-grid').innerHTML = (data || []).map(s => `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-xl transition relative">
                    <div onclick="openGallery('${s.id}', '${s.location}')" class="cursor-pointer">
                        <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f?w=400'}" class="w-full h-48 object-cover">
                        <div class="p-4"><h3 class="font-bold text-lg">${s.location}</h3></div>
                    </div>
                    ${isAdmin ? `
                        <div class="absolute top-2 right-2 z-20">
                            <label class="bg-black/60 text-white px-2 py-1 rounded text-xs cursor-pointer">
                                Editar <input type="file" class="hidden" onchange="updateCover('${s.id}', event)">
                            </label>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function updateCover(sessionId, event) {
            const file = event.target.files[0];
            const fileName = `covers/${sessionId}_${Date.now()}`;
            await client.storage.from('clips').upload(fileName, file);
            const { data } = client.storage.from('clips').getPublicUrl(fileName);
            await client.from('sessions').update({ cover_url: data.publicUrl }).eq('id', sessionId);
            loadSessions();
        }

        function openGallery(id, title) {
            document.getElementById('view-sessions').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerHTML = `<h2 class="text-3xl font-black">${title}</h2>`;
            if (isAdmin) document.getElementById('admin-upload').classList.remove('hidden');
            loadPhotos(id);
        }

        async function loadPhotos(id) {
            const { data } = await client.from('photos').select('*').eq('session_id', id);
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative group rounded-lg overflow-hidden">
                    <img src="${p.url_watermarked || p.url_original}" class="w-full h-64 object-cover">
                </div>
            `).join('');
        }

        function showSessions() {
            document.getElementById('view-sessions').classList.remove('hidden');
            document.getElementById('view-gallery').classList.add('hidden');
        }

        checkUser();
    </script>
</body>
</html>
