<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl sticky top-0 z-40">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleCartModal()" class="relative font-bold hover:text-blue-600">🛒 Cart (<span id="cart-count">0</span>)</button>
            <div id="auth-ui" class="flex items-center gap-2">
                <input type="email" id="email" placeholder="Email" class="border p-1 rounded text-xs w-20">
                <input type="password" id="pass" placeholder="Password" class="border p-1 rounded text-xs w-20">
                <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-700">Login</button>
            </div>
        </div>
    </nav>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-end">
        <div class="bg-white w-full max-w-sm p-6 overflow-y-auto">
            <div class="flex justify-between mb-6"><h2 class="font-black text-xl">Your Selection</h2><button onclick="toggleCartModal()" class="text-2xl">✕</button></div>
            <div id="cart-items" class="grid grid-cols-2 gap-2 mb-6"></div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Proceed to Checkout</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4">
        <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
            <h2 class="font-bold mb-4 text-blue-800">Create New Session</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="loc" placeholder="Location" class="border p-2 rounded-lg text-sm">
                <input type="text" id="time_range" placeholder="Time range" class="border p-2 rounded-lg text-sm">
                <input type="date" id="date" class="border p-2 rounded-lg text-sm">
                <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg">Publish</button>
            </div>
        </section>
        <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold hover:underline">← Back</button>
            <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
            <div id="admin-upload" class="hidden bg-blue-50 p-8 rounded-3xl mb-10 text-center border-2 border-dashed border-blue-200">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Bulk Upload</label>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4" onclick="closeLightbox()">
        <div class="relative"><img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-lg"><img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none"></div>
    </div>

    <script>
        const stripe = Stripe('pk_live_51T8tlD9JfPnTFk2BLILCOhmNYqF33kkEHVToXWOmJll825wYNZWrAWy19vKnCW1NexFNBzai29jKz0uSCKpnMnpo00w2HXIlUI');
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false, currentSessionId = null, cart = [];
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";

        // AUTENTICACIÓN Y ADMIN
        async function login() { const { error } = await client.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('pass').value }); if (error) alert(error.message); else location.reload(); }
        async function logout() { await client.auth.signOut(); location.reload(); }
        async function checkUser() { const { data: { user } } = await client.auth.getUser(); if (user?.email === "wildpauu@gmail.com") { isAdmin = true; document.getElementById('admin-panel').classList.remove('hidden'); document.getElementById('auth-ui').innerHTML = `<span class="text-xs text-green-600">Admin</span> <button onclick="logout()" class="text-xs text-red-500 font-bold">Logout</button>`; } loadSessions(); }

        // CHECKOUT CON SEGURIDAD (CORS FIX)
        async function checkout() { 
            if (cart.length === 0) return alert("Empty cart");
            const response = await fetch('https://gmyptbfrpspzmyucqumz.supabase.co/functions/v1/swift-api', { 
                method: 'POST', 
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU' 
                }, 
                body: JSON.stringify({ photos: cart }) 
            });
            const data = await response.json();
            if (data.url) window.location.href = data.url; else alert("Error: " + (data.error || "Check Supabase"));
        }

        // SESIONES Y GALERÍA
        async function loadSessions() { const { data } = await client.from('sessions').select('*').order('date', { ascending: false }); document.getElementById('sessions-grid').innerHTML = (data || []).map(s => `<div class="bg-white rounded-3xl shadow-sm overflow-hidden border"><div class="cursor-pointer" onclick="openGallery('${s.id}', '${s.location}')"><img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-48 object-cover"><div class="p-5"><h3 class="font-black text-xl">${s.location}</h3><p class="text-gray-500 text-sm">${s.date || ''}</p></div></div>${isAdmin ? `<button onclick="updateCover('${s.id}')" class="w-full py-2 text-xs text-blue-600 border-t font-bold">Change Cover</button>` : ''}</div>`).join(''); }
        async function createSession() { const { error } = await client.from('sessions').insert([{ location: document.getElementById('loc').value, time_range: document.getElementById('time_range').value, date: document.getElementById('date').value }]); if (error) alert(error.message); else location.reload(); }
        async function updateCover(id) { const input = document.createElement('input'); input.type = 'file'; input.onchange = async (e) => { const file = e.target.files[0]; const path = `covers/${Date.now()}_${file.name}`; await client.storage.from('clips').upload(path, file); const { data: { publicUrl } } = client.storage.from('clips').getPublicUrl(path); await client.from('sessions').update({ cover_url: publicUrl }).eq('id', id); location.reload(); }; input.click(); }
        
        // CARRITO Y UPLOAD
        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); renderCart(); }
        function renderCart() { document.getElementById('cart-items').innerHTML = cart.map(url => `<div class="relative rounded-lg overflow-hidden aspect-square"><img src="${url}" class="w-full h-full object-cover"><img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none"></div>`).join(''); }
        function toggleCart(url, cb) { if (cb.checked) cart.push(url); else cart = cart.filter(i => i !== url); document.getElementById('cart-count').innerText = cart.length; }
        async function loadPhotos() { const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId); document.getElementById('photos-grid').innerHTML = (data || []).map(p => `<div class="relative rounded-2xl overflow-hidden aspect-square border-2 border-transparent"><img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox('${p.url_watermarked}')"><img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none"><input type="checkbox" class="absolute top-3 left-3 w-6 h-6 z-10 cursor-pointer" onchange="toggleCart('${p.url_watermarked}', this)"></div>`).join(''); }
        async function handleBulkUpload(e) { for (let file of e.target.files) { const name = `${Date.now()}_${file.name.replace(/\s/g, "_")}`; await client.storage.from('clips').upload(`originals/${name}`, file); await client.storage.from('clips').upload(`watermarked/${name}`, file); const u1 = client.storage.from('clips').getPublicUrl(`originals/${name}`).data.publicUrl; const u2 = client.storage.from('clips').getPublicUrl(`watermarked/${name}`).data.publicUrl; await client.from('photos').insert([{ session_id: currentSessionId, url_original: u1, url_watermarked: u2 }]); } loadPhotos(); }
        
        // VISTA
        function openGallery(id, title) { currentSessionId = id; document.getElementById('sessions-grid').classList.add('hidden'); document.getElementById('admin-panel').classList.add('hidden'); document.getElementById('view-gallery').classList.remove('hidden'); document.getElementById('gallery-header').innerText = title; if (isAdmin) document.getElementById('admin-upload').classList.remove('hidden'); loadPhotos(); }
        function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function showSessions() { location.reload(); }
        checkUser();
    </script>
</body>
</html>
