<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips | Capture the Wave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #hero-section { transition: background 0.8s ease-in-out; background-size: cover; background-position: center; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <section id="hero-section" class="h-screen flex flex-col items-center justify-center text-center p-6 text-white relative">
        <div class="absolute inset-0 hero-gradient"></div>
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl z-10">
            <h1 class="font-black italic text-2xl tracking-tighter cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex gap-8 font-bold text-sm uppercase tracking-widest">
                <button onclick="goToSessions()" class="hover:text-blue-400 transition underline-offset-8 hover:underline">Sessions</button>
                <button onclick="showPacks()" class="hover:text-blue-400 transition underline-offset-8 hover:underline">Packs</button>
            </div>
        </nav>
        
        <div class="z-10">
            <h1 id="hero-title" class="text-6xl md:text-8xl font-black italic mb-4 tracking-tighter uppercase leading-none">CAPTURE THE WAVE</h1>
            <p id="hero-subtitle" class="text-lg md:text-2xl mb-10 max-w-2xl opacity-90 font-medium mx-auto">Professional surf photography from the heart of Byron Bay.</p>
            <button onclick="goToSessions()" class="bg-blue-600 px-14 py-5 rounded-full font-black text-lg hover:bg-blue-500 transition shadow-2xl hover:scale-105 active:scale-95">FIND MY SHOTS</button>
        </div>
    </section>

    <section id="sessions-page" class="hidden flex-grow pt-10 px-4">
        <nav class="max-w-6xl mx-auto flex justify-between items-center mb-10 bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
            <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex items-center gap-6">
                <div id="auth-ui" class="flex gap-2">
                    <input type="email" id="login-email" placeholder="Email" class="border p-2 px-4 rounded-xl text-xs w-40 outline-none focus:ring-2 focus:ring-blue-100">
                    <button onclick="login()" class="bg-gray-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-gray-700 transition">Login</button>
                </div>
                <button onclick="toggleCartModal()" class="font-bold text-blue-600 flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 hover:bg-blue-100 transition">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto pb-20">
            <div id="admin-panel" class="hidden space-y-6 mb-12">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-blue-100 relative">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="font-black text-blue-800 uppercase italic text-2xl">Admin Control Center</h2>
                        <button onclick="exitAdmin()" class="bg-red-50 text-red-600 px-6 py-2 rounded-full text-xs font-black hover:bg-red-600 hover:text-white transition uppercase tracking-widest border border-red-100">Exit Admin</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-4 bg-gray-50 p-6 rounded-3xl">
                            <h3 class="font-black text-gray-400 text-[10px] tracking-widest uppercase">1. Website Appearance</h3>
                            <input type="text" id="edit-hero-title" placeholder="Hero Title" class="w-full border p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <input type="text" id="edit-hero-subtitle" placeholder="Hero Subtitle" class="w-full border p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <label class="block text-[10px] font-black text-gray-500 uppercase">Fondo de la Web</label>
                            <input type="file" id="edit-hero-bg-file" class="text-xs">
                            <button onclick="updateSiteSettings()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition">UPDATE WEBSITE</button>
                        </div>

                        <div class="space-y-4 bg-gray-50 p-6 rounded-3xl">
                            <h3 class="font-black text-gray-400 text-[10px] tracking-widest uppercase">2. Create New Session</h3>
                            <input type="text" id="new-loc" placeholder="Location Name" class="w-full border p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <input type="date" id="new-date" class="w-full border p-3 rounded-xl text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <label class="block text-[10px] font-black text-gray-500 uppercase">Foto de Portada</label>
                            <input type="file" id="new-cover-file" class="text-xs">
                            <button onclick="createSession()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl hover:bg-green-700 transition">PUBLISH SESSION</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sessions-grid-container">
                <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
            </div>
            
            <div id="view-gallery" class="hidden">
                <div class="flex items-center gap-4 mb-10">
                    <button onclick="showSessions()" class="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md transition text-blue-600 font-bold border border-gray-100">← BACK</button>
                    <h2 id="gallery-header" class="text-4xl font-black italic text-gray-900 tracking-tighter"></h2>
                </div>
                
                <div id="admin-upload-area" class="hidden bg-blue-50 p-10 rounded-[2.5rem] mb-12 text-center border-4 border-dashed border-blue-200">
                    <input type="file" id="bulk-files" multiple class="hidden" onchange="handleBulkUpload(event)">
                    <label for="bulk-files" class="bg-blue-600 text-white px-10 py-5 rounded-full font-black cursor-pointer hover:bg-blue-700 transition inline-block shadow-xl uppercase tracking-widest text-sm">SELECT PHOTOS TO UPLOAD</label>
                    <div id="upload-progress-container" class="hidden mt-8 max-w-md mx-auto">
                        <div class="w-full bg-blue-200 rounded-full h-3 overflow-hidden border border-blue-200">
                            <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>
        </main>

        <footer class="max-w-6xl mx-auto w-full py-12 border-t border-gray-100 text-center space-y-4 mt-auto">
            <div class="flex justify-center gap-6 text-gray-400 font-bold text-xs uppercase tracking-[0.2em]">
                <a href="https://instagram.com/byron.surf.clips" target="_blank" class="hover:text-pink-500 transition">@byron.surf.clips</a>
            </div>
            <p class="text-gray-300 text-[10px] font-medium tracking-widest uppercase">© Byron Surf Clips. All Rights Reserved.</p>
        </footer>
    </section>

    <section id="packs-page" class="hidden flex-grow pt-24 p-6 bg-gray-900 text-white">
        <div id="packs-container" class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl mx-auto"></div>
        <button onclick="backToHome()" class="mt-20 block mx-auto text-blue-400 font-bold uppercase tracking-widest hover:underline hover:text-blue-300 transition">← Exit to Home</button>
    </section>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-8 overflow-y-auto flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic tracking-tighter">YOUR CART</h2>
                <button onclick="toggleCartModal()" class="text-gray-300 hover:text-black text-3xl font-bold transition">✕</button>
            </div>
            <div id="cart-items" class="grid grid-cols-2 gap-4 flex-grow content-start no-scrollbar overflow-y-auto"></div>
            <div class="pt-6 border-t border-gray-100 mt-6">
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl hover:bg-blue-700 transition shadow-xl uppercase tracking-widest">Checkout with Stripe</button>
            </div>
        </div>
    </div>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/95 backdrop-blur-sm flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-6 text-white text-5xl hover:text-blue-400 transition p-4">❮</button>
        <div class="relative max-w-5xl w-full flex justify-center">
            <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl border border-white/10">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none object-contain">
        </div>
        <button onclick="nextPhoto()" class="absolute right-6 text-white text-5xl hover:text-blue-400 transition p-4">❯</button>
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-3xl hover:text-red-500 transition">✕</button>
    </div>

    <script>
        const SUPA_URL = 'https://gmyptbfrpspzmyucqumz.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU'; 
        const client = supabase.createClient(SUPA_URL, SUPA_KEY);
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";
        
        let sessions = [], currentPhotos = [], cart = [], currentIndex = 0, isAdmin = false, currentSessionId = null;

        async function init() {
            await loadSiteSettings();
            await checkUser();
            await loadSessions();
        }

        async function loadSiteSettings() {
            const { data } = await client.from('site_settings').select('*').eq('id', 'main').single();
            if (data) {
                document.getElementById('hero-title').innerText = data.hero_title;
                document.getElementById('hero-subtitle').innerText = data.hero_subtitle;
                document.getElementById('hero-section').style.backgroundImage = `url('${data.hero_bg_url}')`;
                document.getElementById('edit-hero-title').value = data.hero_title || '';
                document.getElementById('edit-hero-subtitle').value = data.hero_subtitle || '';
            }
        }

        async function updateSiteSettings() {
            if(!isAdmin) return;
            const file = document.getElementById('edit-hero-bg-file').files[0];
            let bgUrl = '';
            
            if (file) {
                const { data } = await client.storage.from('clips').upload(`hero/${Date.now()}.jpg`, file);
                bgUrl = `${SUPA_URL}/storage/v1/object/public/clips/${data.path}`;
            }

            const updates = {
                hero_title: document.getElementById('edit-hero-title').value,
                hero_subtitle: document.getElementById('edit-hero-subtitle').value
            };
            if(bgUrl) updates.hero_bg_url = bgUrl;

            await client.from('site_settings').update(updates).eq('id', 'main');
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user && user.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-xs font-black bg-blue-50 text-blue-600 px-4 py-2 rounded-xl">${user.email}</span>`;
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const { error } = await client.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin }});
            if (error) alert(error.message); else alert("Magic link sent!");
        }

        function exitAdmin() { isAdmin = false; document.getElementById('admin-panel').classList.add('hidden'); }
        function hideAll() { ['hero-section', 'sessions-page', 'packs-page'].forEach(id => document.getElementById(id).classList.add('hidden')); }
        function backToHome() { hideAll(); document.getElementById('hero-section').classList.remove('hidden'); }
        function goToSessions() { hideAll(); document.getElementById('sessions-page').classList.remove('hidden'); showSessions(); }
        function showSessions() { document.getElementById('view-gallery').classList.add('hidden'); document.getElementById('sessions-grid-container').classList.remove('hidden'); }

        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            sessions = data || [];
            document.getElementById('sessions-grid').innerHTML = sessions.map(s => `
                <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-gray-100 group">
                    <img src="${s.cover_url}" class="h-64 w-full object-cover cursor-pointer hover:scale-105 transition duration-700" onclick="openGallery('${s.id}', '${s.location}')">
                    <div class="p-8">
                        <h3 class="font-black text-2xl">${s.location}</h3>
                        <p class="text-gray-400 text-xs font-bold uppercase mb-6">${s.date}</p>
                        <button onclick="openGallery('${s.id}', '${s.location}')" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black text-xs hover:bg-blue-600 transition">VIEW GALLERY</button>
                    </div>
                </div>`).join('');
        }

        async function createSession() {
            const file = document.getElementById('new-cover-file').files[0];
            const loc = document.getElementById('new-loc').value;
            const date = document.getElementById('new-date').value;
            if(!file || !loc) return alert("Select photo and location");
            
            const { data } = await client.storage.from('clips').upload(`covers/${Date.now()}.jpg`, file);
            const coverUrl = `${SUPA_URL}/storage/v1/object/public/clips/${data.path}`;
            await client.from('sessions').insert([{ location: loc, date: date, cover_url: coverUrl }]);
            location.reload();
        }

        async function openGallery(id, title) {
            currentSessionId = id;
            document.getElementById('sessions-grid-container').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerText = title;
            if(isAdmin) document.getElementById('admin-upload-area').classList.remove('hidden');
            
            const { data } = await client.from('photos').select('*').eq('session_id', id);
            currentPhotos = data || [];
            document.getElementById('photos-grid').innerHTML = currentPhotos.map((p, i) => `
                <div class="relative aspect-square rounded-[2rem] overflow-hidden shadow-sm bg-gray-100">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox(${i})">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none object-contain">
                    <input type="checkbox" class="absolute top-4 left-4 w-6 h-6 accent-blue-600" onchange="toggleCart('${p.url_watermarked}', this)">
                </div>`).join('');
        }

        async function checkout() {
            if(cart.length === 0) return alert("Empty cart");
            const btn = document.getElementById('checkout-btn');
            btn.innerText = "REDIRECTING...";
            const { data, error } = await client.functions.invoke('create-checkout-session', { body: { items: cart } });
            if (data?.url) window.location.href = data.url; else alert("Checkout Error: " + error?.message);
        }

        function toggleCart(url, el) {
            if(el.checked) cart.push(url); else cart = cart.filter(u => u !== url);
            document.getElementById('cart-count').innerText = cart.length;
            renderCart();
        }
        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function renderCart() {
            document.getElementById('cart-items').innerHTML = cart.map(url => `
                <div class="relative aspect-square rounded-2xl overflow-hidden shadow-inner"><img src="${url}" class="w-full h-full object-cover"></div>`).join('');
        }
        function openLightbox(i) { currentIndex = i; document.getElementById('lightbox-img').src = currentPhotos[i].url_watermarked; document.getElementById('lightbox').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
