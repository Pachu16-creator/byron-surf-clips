<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/hero-default.jpg'); 
            background-size: cover; background-position: center; 
        }
        .watermark-overlay {
            position: absolute; inset: 0; width: 100%; height: 100%;
            background-image: url('https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            opacity: 0.3; pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <section id="landing-page" class="hero-bg h-screen flex flex-col items-center justify-center text-center p-6 text-white relative">
        <nav class="absolute top-0 w-full p-8 flex justify-between items-center max-w-[1400px]">
            <h1 class="font-serif font-bold text-2xl tracking-wide">Byron Surf Clips</h1>
            <div class="flex items-center gap-6 font-semibold text-[12px] tracking-widest uppercase">
                <button onclick="goToSessions()" class="hover:text-gray-300">Find My Shot</button>
                <button onclick="document.getElementById('auth-modal').classList.toggle('hidden')"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
                <button onclick="toggleCartModal()" class="relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-black text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </button>
            </div>
        </nav>

        <div id="hero-admin-btn" class="hidden absolute top-24 right-8 bg-black/40 p-2 rounded-lg backdrop-blur-md">
            <label class="cursor-pointer text-[10px] font-bold text-white uppercase tracking-tighter"> Change BG <input type="file" class="hidden" accept="image/*" onchange="updateHeroBg(event)"></label>
        </div>

        <h1 class="text-6xl md:text-8xl font-serif font-bold mb-4">Byron Surf Clips</h1>
        <p class="text-lg md:text-xl mb-12 font-light tracking-widest opacity-80 uppercase">Capturing the essence of Byron Bay's waves</p>
        <button onclick="goToSessions()" class="bg-white/10 backdrop-blur-md border border-white/40 px-12 py-4 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-white hover:text-black transition-all">Find My Shot</button>
    </section>

    <section id="sessions-page" class="hidden pt-12 px-6">
        <div class="max-w-7xl mx-auto">
            
            <div id="sessions-header" class="mb-12">
                <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-8">
                    <div>
                        <button onclick="backToHome()" class="text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-black mb-2">← Back Home</button>
                        <h2 class="font-serif text-5xl font-bold">The Sessions</h2>
                    </div>
                    <div class="flex flex-wrap gap-3 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
                        <input type="text" id="search-loc" placeholder="Search Location..." class="text-xs p-3 outline-none w-40" oninput="filterSessions()">
                        <input type="date" id="search-date" class="text-xs p-3 outline-none border-l" onchange="filterSessions()">
                        <button onclick="resetFilters()" class="text-[10px] font-bold px-4 text-gray-400 hover:text-red-500">Reset</button>
                    </div>
                </div>

                <div id="admin-panel" class="hidden bg-gray-900 p-8 rounded-[2.5rem] text-white mb-12">
                    <h3 class="font-bold text-xs uppercase tracking-widest mb-6 text-gray-400">Admin: New Session</h3>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <input type="text" id="new-loc" placeholder="Location (e.g. Pass)" class="bg-white/10 border-white/20 p-4 rounded-2xl text-sm outline-none">
                        <input type="date" id="new-date" class="bg-white/10 border-white/20 p-4 rounded-2xl text-sm outline-none">
                        <input type="number" id="new-price" placeholder="Price ($)" class="bg-white/10 border-white/20 p-4 rounded-2xl text-sm outline-none">
                        <label class="bg-white/5 border border-dashed border-white/30 p-4 rounded-2xl text-xs flex items-center justify-center cursor-pointer">
                            📁 Cover Image <input type="file" id="new-cover" class="hidden">
                        </label>
                        <button onclick="createSession()" class="bg-white text-black font-black rounded-2xl hover:bg-gray-200 transition">Publish</button>
                    </div>
                </div>
            </div>

            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 pb-20"></div>

            <div id="view-gallery" class="hidden pb-20">
                <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                    <div class="flex items-center gap-6">
                        <button onclick="showSessions()" class="bg-white w-12 h-12 rounded-full shadow-sm flex items-center justify-center hover:bg-black hover:text-white transition">←</button>
                        <h2 id="gallery-header" class="font-serif text-4xl font-bold"></h2>
                    </div>
                    <div class="flex items-center gap-4">
                        <div id="gallery-price-tag" class="bg-gray-900 text-white px-6 py-2 rounded-full text-sm font-bold tracking-tighter"></div>
                        <div id="admin-upload-btn" class="hidden">
                            <input type="file" id="bulk-files" multiple class="hidden" onchange="handleBulkUpload(event)">
                            <label for="bulk-files" class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold cursor-pointer hover:bg-blue-700">Add Photos</label>
                        </div>
                    </div>
                </div>
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>
    </section>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-serif text-3xl font-bold">Cart</h2>
                <button onclick="toggleCartModal()" class="text-2xl text-gray-400">✕</button>
            </div>
            <div id="cart-items" class="flex-grow grid grid-cols-2 gap-4 content-start overflow-y-auto pr-2"></div>
            <div class="pt-6 border-t mt-6">
                <div class="flex justify-between font-bold text-xl mb-6 px-2">
                    <span>Total</span>
                    <span id="cart-total">$0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-gray-900 text-white font-black py-5 rounded-2xl tracking-widest uppercase hover:bg-black transition">Checkout with Stripe</button>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://gmyptbfrpspzmyucqumz.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU'; 
        const client = supabase.createClient(SUPA_URL, SUPA_KEY);
        
        let allSessions = [], cart = [], isAdmin = false, currentSessionId = null, currentPrice = 0;

        async function init() {
            await loadSiteSettings();
            await checkUser();
            await loadSessions();
        }

        async function loadSiteSettings() {
            const { data } = await client.from('site_settings').select('*').eq('id', 'main').single();
            if (data?.hero_bg_url) document.getElementById('landing-page').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), url('${data.hero_bg_url}')`;
        }

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('hero-admin-btn').classList.remove('hidden');
                document.getElementById('admin-upload-btn')?.classList.remove('hidden');
            }
        }

        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            allSessions = data || [];
            renderSessions(allSessions);
        }

        function renderSessions(data) {
            document.getElementById('sessions-grid').innerHTML = data.map(s => `
                <div onclick="openGallery('${s.id}', '${s.location}', ${s.price})" class="group bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 cursor-pointer">
                    <div class="h-80 overflow-hidden relative">
                        <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-6 left-8 text-white">
                            <h3 class="font-serif text-3xl font-bold">${s.location}</h3>
                            <p class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-70">${s.date}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        // FILTROS
        function filterSessions() {
            const loc = document.getElementById('search-loc').value.toLowerCase();
            const date = document.getElementById('search-date').value;
            const filtered = allSessions.filter(s => {
                const matchLoc = s.location.toLowerCase().includes(loc);
                const matchDate = date ? s.date === date : true;
                return matchLoc && matchDate;
            });
            renderSessions(filtered);
        }

        function resetFilters() {
            document.getElementById('search-loc').value = '';
            document.getElementById('search-date').value = '';
            renderSessions(allSessions);
        }

        // GALLERY
        async function openGallery(id, title, price) {
            currentSessionId = id;
            currentPrice = price || 10;
            document.getElementById('sessions-grid').classList.add('hidden');
            document.getElementById('sessions-header').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            
            document.getElementById('gallery-header').innerText = title;
            document.getElementById('gallery-price-tag').innerText = `$${currentPrice} PER PHOTO`;
            
            loadPhotos();
        }

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative aspect-[3/4] rounded-2xl overflow-hidden shadow-sm border border-gray-100 group">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover">
                    <div class="watermark-overlay"></div>
                    <div class="absolute top-4 left-4 z-20">
                        <input type="checkbox" onchange="toggleCart('${p.url_watermarked}', this)" class="w-6 h-6 accent-black cursor-pointer shadow-xl" ${cart.some(c => c.url === p.url_watermarked) ? 'checked' : ''}>
                    </div>
                    ${isAdmin ? `<button onclick="setCover('${p.url_watermarked}')" class="absolute bottom-4 left-4 bg-white/90 text-[10px] font-black px-3 py-1 rounded-full shadow-lg z-20">SET COVER</button>` : ''}
                </div>`).join('');
        }

        function toggleCart(url, el) {
            if(el.checked) cart.push({url, price: currentPrice});
            else cart = cart.filter(c => c.url !== url);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('cart-total').innerText = `$${total}`;
            
            document.getElementById('cart-items').innerHTML = cart.map(c => `
                <div class="relative aspect-square rounded-xl overflow-hidden border">
                    <img src="${c.url}" class="w-full h-full object-cover">
                    <div class="watermark-overlay" style="opacity: 0.2"></div>
                </div>`).join('');
        }

        async function setCover(url) {
            await client.from('sessions').update({ cover_url: url }).eq('id', currentSessionId);
            alert("Cover Updated!");
        }

        function showSessions() {
            document.getElementById('view-gallery').classList.add('hidden');
            document.getElementById('sessions-grid').classList.remove('hidden');
            document.getElementById('sessions-header').classList.remove('hidden');
        }

        function goToSessions() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('sessions-page').classList.remove('hidden');
        }

        function backToHome() {
            document.getElementById('sessions-page').classList.add('hidden');
            document.getElementById('landing-page').classList.remove('hidden');
        }

        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function checkout() {
            alert("Redirecting to Stripe Checkout for " + cart.length + " photos...");
            // Aquí integrarías tu función de Cloud Function o Edge Function para Stripe
        }

        init();
    </script>
</body>
</html>
