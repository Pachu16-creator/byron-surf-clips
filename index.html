<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #hero-section { transition: background 0.5s ease-in-out; background-size: cover; background-position: center; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <section id="hero-section" class="h-screen flex flex-col items-center justify-center text-center p-6 text-white relative">
        <div class="absolute inset-0 hero-gradient"></div>
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl z-10">
            <h1 class="font-black italic text-2xl tracking-tighter">BYRON SURF CLIPS</h1>
            <div class="flex gap-6 font-bold text-sm">
                <button onclick="goToSessions()" class="hover:text-blue-400">SESSIONS</button>
                <button onclick="showPacks()" class="hover:text-blue-400">PACKS</button>
            </div>
        </nav>
        
        <div class="z-10">
            <h1 id="hero-title" class="text-7xl font-black italic mb-6 tracking-tighter uppercase">CAPTURE THE WAVE</h1>
            <p id="hero-subtitle" class="text-xl mb-10 max-w-lg opacity-90 font-medium mx-auto">High-quality surf photography from Byron Bay.</p>
            <button onclick="goToSessions()" class="bg-blue-600 px-12 py-4 rounded-full font-bold text-lg hover:bg-blue-500 transition shadow-xl">View Sessions</button>
        </div>
    </section>

    <section id="sessions-page" class="hidden flex-grow pt-10 px-4">
        <nav class="max-w-6xl mx-auto flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm border">
            <h1 class="font-black text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div id="auth-ui" class="flex gap-2">
                <input type="email" id="login-email" placeholder="Admin/User Email" class="border p-2 rounded-lg text-xs">
                <button onclick="login()" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold">Login</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto">
            <div id="admin-panel" class="hidden space-y-6 mb-10">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-blue-100">
                    <h2 class="font-black text-blue-800 mb-4 uppercase italic">Edit Website Appearance</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="edit-hero-title" placeholder="Hero Title" class="border p-3 rounded-xl text-sm">
                        <input type="text" id="edit-hero-subtitle" placeholder="Hero Subtitle" class="border p-3 rounded-xl text-sm">
                        <input type="text" id="edit-hero-bg" placeholder="Hero Image URL" class="border p-3 rounded-xl text-sm">
                        <button onclick="updateSiteSettings()" class="bg-blue-600 text-white font-bold py-3 rounded-xl">Save Changes</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-dashed border-green-200">
                    <h2 class="font-black text-green-800 mb-4 uppercase italic">Create New Session</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="new-loc" placeholder="Location" class="border p-3 rounded-xl text-sm">
                        <input type="text" id="new-time" placeholder="Time (e.g. 7am-9am)" class="border p-3 rounded-xl text-sm">
                        <input type="date" id="new-date" class="border p-3 rounded-xl text-sm">
                        <input type="text" id="new-cover" placeholder="Cover Image URL" class="border p-3 rounded-xl text-sm">
                        <button onclick="createSession()" class="bg-green-600 text-white font-bold py-3 rounded-xl">Publish</button>
                    </div>
                </div>
            </div>

            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </section>

    <script>
        // CONFIG (Asegúrate de poner tus claves reales)
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'TU_ANON_KEY_AQUI');
        let isAdmin = false;

        async function init() {
            await loadSiteSettings();
            await checkUser();
            await loadSessions();
        }

        // --- SITE SETTINGS (HERO) ---
        async function loadSiteSettings() {
            const { data } = await client.from('site_settings').select('*').eq('id', 'main').single();
            if (data) {
                document.getElementById('hero-title').innerText = data.hero_title;
                document.getElementById('hero-subtitle').innerText = data.hero_subtitle;
                document.getElementById('hero-section').style.backgroundImage = `url('${data.hero_bg_url}')`;
                
                // Llenar inputs de edición
                document.getElementById('edit-hero-title').value = data.hero_title;
                document.getElementById('edit-hero-subtitle').value = data.hero_subtitle;
                document.getElementById('edit-hero-bg').value = data.hero_bg_url;
            }
        }

        async function updateSiteSettings() {
            const updates = {
                hero_title: document.getElementById('edit-hero-title').value,
                hero_subtitle: document.getElementById('edit-hero-subtitle').value,
                hero_bg_url: document.getElementById('edit-hero-bg').value
            };
            const { error } = await client.from('site_settings').update(updates).eq('id', 'main');
            if (!error) { alert("Web updated!"); location.reload(); }
        }

        // --- SESSIONS ---
        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            const grid = document.getElementById('sessions-grid');
            grid.innerHTML = (data || []).map(s => `
                <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden relative">
                    <img src="${s.cover_url || ''}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <h3 class="font-black text-xl">${s.location}</h3>
                        <p class="text-blue-600 text-xs font-bold uppercase">${s.time_range || ''}</p>
                        
                        <div class="mt-4 flex gap-2">
                            <button onclick="openGallery('${s.id}')" class="bg-gray-100 px-4 py-2 rounded-lg text-xs font-bold">View Photos</button>
                            ${isAdmin ? `
                                <button onclick="deleteSession('${s.id}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-100">Delete</button>
                                <button onclick="editCover('${s.id}')" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-xs font-bold">Edit Cover</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteSession(id) {
            if (!confirm("Are you sure you want to delete this entire session and all its photos?")) return;
            const { error } = await client.from('sessions').delete().eq('id', id);
            if (!error) loadSessions();
        }

        async function editCover(id) {
            const newUrl = prompt("Enter new Cover Image URL:");
            if (newUrl) {
                await client.from('sessions').update({ cover_url: newUrl }).eq('id', id);
                loadSessions();
            }
        }

        async function createSession() {
            const payload = {
                location: document.getElementById('new-loc').value,
                time_range: document.getElementById('new-time').value,
                date: document.getElementById('new-date').value,
                cover_url: document.getElementById('new-cover').value
            };
            await client.from('sessions').insert([payload]);
            loadSessions();
        }

        // --- AUTH ---
        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-xs font-bold text-green-600">ADMIN MODE</span>`;
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            await client.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://byron-surf-clips.vercel.app' } });
            alert("Check email!");
        }

        function hideAll() { document.getElementById('hero-section').classList.add('hidden'); document.getElementById('sessions-page').classList.add('hidden'); }
        function goToSessions() { hideAll(); document.getElementById('sessions-page').classList.remove('hidden'); }
        function backToHome() { hideAll(); document.getElementById('hero-section').classList.remove('hidden'); }

        init();
    </script>
</body>
</html>
