<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl sticky top-0 z-40">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui" class="flex items-center gap-2">
            <input type="email" id="email" placeholder="Email" class="border p-1 rounded text-xs w-24">
            <input type="password" id="pass" placeholder="Pass" class="border p-1 rounded text-xs w-24">
            <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold">Login</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
            <h2 class="font-bold mb-4 text-blue-800">Crear Nueva Sesión</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="loc" placeholder="Ubicación" class="border p-2 rounded-lg text-sm">
                <input type="text" id="time_range" placeholder="Horario" class="border p-2 rounded-lg text-sm">
                <input type="date" id="date" class="border p-2 rounded-lg text-sm">
                <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700">Publicar</button>
            </div>
        </section>

        <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold hover:underline">← Volver</button>
            <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
            <div id="admin-upload" class="hidden bg-blue-50 p-8 rounded-3xl mb-10 text-center border-2 border-dashed border-blue-200">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Subir Fotos</label>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="cart-bar" class="hidden fixed bottom-6 left-6 right-6 bg-blue-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center z-50 max-w-6xl mx-auto">
        <span id="cart-count" class="font-bold">0 fotos seleccionadas</span>
        <button onclick="checkout()" class="bg-yellow-400 text-blue-900 px-6 py-2 rounded-xl font-black hover:bg-yellow-300">COMPRAR</button>
    </div>

    <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4" onclick="closeLightbox()">
        <div class="relative">
            <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-lg">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
        </div>
        <button class="absolute top-5 right-5 text-white text-3xl font-bold">✕</button>
    </div>

    

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false; let currentSessionId = null; let cart = [];

        async function login() {
            const { error } = await client.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('pass').value });
            if (error) alert(error.message); else location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-xs text-green-600">Admin</span> <button onclick="logout()" class="text-xs text-red-500">Salir</button>`;
            }
            loadSessions();
        }

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative rounded-2xl overflow-hidden aspect-square border-4 border-transparent group">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox('${p.url_watermarked}')">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                    <input type="checkbox" class="absolute top-3 left-3 w-6 h-6 z-10 cursor-pointer" onchange="toggleCart('${p.url_watermarked}', this)">
                </div>
            `).join('');
        }

        function toggleCart(url, checkbox) {
            if (checkbox.checked) cart.push(url);
            else cart = cart.filter(item => item !== url);
            
            document.getElementById('cart-bar').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-count').innerText = `${cart.length} fotos seleccionadas`;
        }

        function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function showSessions() { location.reload(); }
        // ... (Mantén aquí las funciones auxiliares de crear sesión y carga original)
        checkUser();
    </script>
</body>
</html>
