<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui" class="flex items-center"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="view-sessions">
            <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
                <h2 class="font-bold mb-4 text-blue-800">Crear Nueva Sesión (Admin)</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="loc" placeholder="Ubicación" class="border p-2 rounded-lg text-sm">
                    <input type="text" id="time" placeholder="Horario" class="border p-2 rounded-lg text-sm">
                    <input type="date" id="date" class="border p-2 rounded-lg text-sm">
                    <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Publicar</button>
                </div>
            </section>
            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-6 flex items-center text-blue-600 font-bold hover:underline">← Volver</button>
            <div id="gallery-header" class="mb-8"></div>
            <div id="admin-upload" class="hidden bg-blue-50 p-8 rounded-3xl mb-10 text-center border-2 border-blue-200 border-dashed">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Subir Fotos</label>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4" onclick="closeLightbox()">
        <div class="relative">
            <img id="lightbox-img" class="max-w-full max-h-screen object-contain rounded-lg">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
        </div>
        <button class="absolute top-5 right-5 text-white font-black text-2xl">✕</button>
    </div>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false; 
        let currentSessionId = null;

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            isAdmin = (user?.email === "wildpauu@gmail.com");
            if (isAdmin) {
                document.getElementById('auth-ui').innerHTML = `<span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full mr-3 shadow">ADMIN</span>`;
                document.getElementById('admin-panel').classList.remove('hidden');
            }
            loadSessions();
        }

        async function createSession() { 
            const loc = document.getElementById('loc').value; 
            const time = document.getElementById('time').value; 
            const date = document.getElementById('date').value; 
            await client.from('sessions').insert([{ location: loc, time: time, date: date }]); 
            location.reload(); 
        }

        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            document.getElementById('sessions-grid').innerHTML = (data || []).map(s => `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border relative">
                    <div onclick="openGallery('${s.id}', '${s.location}')" class="cursor-pointer">
                        <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <h3 class="font-black text-xl">${s.location}</h3>
                            <p class="text-gray-500 text-sm">${s.date} • ${s.time}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openGallery(id, title) {
            currentSessionId = id;
            document.getElementById('view-sessions').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerHTML = `<h2 class="text-3xl font-black">${title}</h2>`;
            if (isAdmin) document.getElementById('admin-upload').classList.remove('hidden');
            loadPhotos();
        }

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";
            
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative rounded-2xl overflow-hidden shadow aspect-square bg-gray-200 cursor-pointer group" onclick="openLightbox('${p.url_watermarked}')">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none">
                    <div class="absolute inset-0 flex items-end p-2">
                         <button onclick="event.stopPropagation(); window.open('https://stripe.com', '_blank')" class="bg-white/90 w-full py-2 rounded-lg text-xs font-bold shadow">COMPRAR</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleBulkUpload(event) {
            const files = event.target.files;
            alert("Subiendo...");
            for (let file of files) {
                const cleanName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
                const pathOrig = `originals/${cleanName}`;
                const pathWm = `watermarked/${cleanName}`;
                await client.storage.from('clips').upload(pathOrig, file);
                await client.storage.from('clips').upload(pathWm, file);
                const urlOrig = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${pathOrig}`;
                const urlWm = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${pathWm}`;
                await client.from('photos').insert([{ session_id: currentSessionId, url_original: urlOrig, url_watermarked: urlWm }]);
            }
            loadPhotos();
        }

        function openLightbox(url) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        }

        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function showSessions() { document.getElementById('view-sessions').classList.remove('hidden'); document.getElementById('view-gallery').classList.add('hidden'); }
        
        checkUser();
    </script>
</body>
</html>
