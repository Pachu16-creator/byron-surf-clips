<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.hero-bg { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/hero-default.jpg'); background-size: cover; background-position: center; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <section id="landing-page" class="hero-bg h-screen flex flex-col items-center justify-center text-center p-6 text-white">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl">
            <h1 class="font-black italic text-2xl">BYRON SURF CLIPS</h1>
            <div class="flex gap-6 font-bold text-sm">
                <button onclick="goToSessions()" class="hover:text-blue-400">FIND MY SHOT</button>
                <button onclick="showPacks()" class="hover:text-blue-400">PACKS</button>
            </div>
        </nav>
        <h1 class="text-6xl font-black italic mb-6">CAPTURE THE WAVE</h1>
        <button onclick="goToSessions()" class="bg-blue-600 px-10 py-4 rounded-full font-bold text-lg hover:bg-blue-500 transition">View Sessions</button>
    </section>

    <section id="sessions-page" class="hidden flex-grow pt-10 px-4">
        <nav class="max-w-6xl mx-auto flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
            <h1 class="font-black text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div id="auth-ui" class="flex gap-2">
                <input type="email" id="email" placeholder="Email for Magic Link" class="border p-2 rounded-lg text-sm">
                <button onclick="login()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Login</button>
            </div>
            <button onclick="toggleCartModal()">🛒 Cart (<span id="cart-count">0</span>)</button>
        </nav>
        
        <main class="max-w-6xl mx-auto">
            <div id="admin-panel" class="hidden bg-yellow-50 p-6 rounded-2xl mb-8 border-2 border-yellow-200">
                <h2 class="font-bold text-yellow-800">Admin Mode</h2>
                <input type="text" id="loc" placeholder="Location" class="border p-2 rounded">
                <button onclick="createSession()" class="bg-green-600 text-white px-4 py-2 rounded">Create Session</button>
            </div>
            
            <div id="sessions-grid-container">
                <input type="text" id="filter-loc" placeholder="Filter location..." class="w-full p-3 rounded-xl border mb-8" onkeyup="filterSessions()">
                <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
            
            <div id="view-gallery" class="hidden">
                <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold">← Back to Sessions</button>
                <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </main>
    </section>

    <section id="packs-page" class="hidden flex-grow pt-20 p-6">
        <h2 class="text-4xl font-black text-center mb-10">Photo Packs</h2>
        <div id="packs-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto"></div>
        <button onclick="backToHome()" class="mt-10 block mx-auto text-blue-600 font-bold">← Back Home</button>
    </section>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-4 text-white text-5xl">❮</button>
        <div class="relative">
            <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-lg">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
        </div>
        <button onclick="nextPhoto()" class="absolute right-4 text-white text-5xl">❯</button>
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-3xl">✕</button>
    </div>

    <script>
        // 1. Sustituye TU_ANON_KEY_AQUI por la clave real de tu proyecto Supabase
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'TU_ANON_KEY_AQUI');
        
        let sessions = [], currentPhotos = [], cart = [], currentIndex = 0, isAdmin = false;
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";

        // CORE FUNCTIONS
        function hideAll() { document.getElementById('landing-page').classList.add('hidden'); document.getElementById('sessions-page').classList.add('hidden'); document.getElementById('packs-page').classList.add('hidden'); }
        function goToSessions() { hideAll(); document.getElementById('sessions-page').classList.remove('hidden'); loadSessions(); }
        function showPacks() { hideAll(); document.getElementById('packs-page').classList.remove('hidden'); loadPacks(); }
        function backToHome() { hideAll(); document.getElementById('landing-page').classList.remove('hidden'); }
        function showSessions() { document.getElementById('view-gallery').classList.add('hidden'); document.getElementById('sessions-grid-container').classList.remove('hidden'); }

        // AUTH
        async function login() {
            const email = document.getElementById('email').value;
            const { error } = await client.auth.signInWithOtp({ email });
            if (error) alert(error.message); else alert("Check your email for the magic link!");
        }

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-green-600 font-bold text-sm">ADMIN</span>`;
            }
        }

        // SESSIONS
        async function loadSessions() {
            const { data, error } = await client.from('sessions').select('*');
            if (error) { console.error("Error loading sessions:", error); return; }
            sessions = data || [];
            document.getElementById('sessions-grid').innerHTML = sessions.map(s => `
                <div class="bg-white rounded-3xl border cursor-pointer p-5" onclick="openGallery('${s.id}', '${s.location}')">
                    <h3 class="font-black text-xl">${s.location}</h3>
                    <p class="text-blue-600">${s.time_range || ''}</p>
                    <p class="text-gray-500 text-sm">${s.date || ''}</p>
                </div>`).join('');
        }

        async function openGallery(id, title) {
            document.getElementById('sessions-grid-container').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerText = title;
            const { data } = await client.from('photos').select('*').eq('session_id', id);
            currentPhotos = data || [];
            document.getElementById('photos-grid').innerHTML = currentPhotos.map((p, i) => `
                <div class="relative aspect-square">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox(${i})">
                    <input type="checkbox" class="absolute top-2 left-2 w-6 h-6" onchange="toggleCart('${p.url_watermarked}', this)">
                </div>`).join('');
        }

        // LIGHTBOX
        function openLightbox(i) { currentIndex = i; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; document.getElementById('lightbox').classList.remove('hidden'); }
        function nextPhoto() { currentIndex = (currentIndex + 1) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function prevPhoto() { currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

        // INIT
        checkUser();
        loadSessions();
    </script>
</body>
</html>
