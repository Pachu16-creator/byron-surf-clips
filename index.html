<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips | Professional Surf Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #hero-section { background-size: cover; background-position: center; transition: background 0.5s; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <section id="hero-section" class="h-screen flex flex-col items-center justify-center text-center p-6 text-white relative">
        <div class="absolute inset-0 hero-gradient"></div>
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl z-10">
            <h1 class="font-black italic text-2xl tracking-tighter cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex gap-8 font-bold text-sm uppercase"><button onclick="goToSessions()">Sessions</button><button onclick="showPacks()">Packs</button></div>
        </nav>
        <div class="z-10">
            <h1 id="hero-title" class="text-6xl md:text-8xl font-black italic mb-4 uppercase">CAPTURE THE WAVE</h1>
            <p id="hero-subtitle" class="text-xl mb-10 opacity-90">Professional Surf Photography</p>
            <button onclick="goToSessions()" class="bg-blue-600 px-12 py-4 rounded-full font-black hover:bg-blue-500 transition">FIND MY SHOTS</button>
        </div>
    </section>

    <div id="admin-panel" class="hidden max-w-4xl mx-auto mt-10 bg-white p-8 rounded-3xl shadow-lg border-2 border-blue-100">
        <div class="flex justify-between mb-6">
            <h2 class="font-black text-blue-800 uppercase italic">Admin Panel</h2>
            <button onclick="exitAdmin()" class="bg-gray-200 px-4 py-2 rounded-xl text-xs font-bold">EXIT ADMIN</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2">Portada Web</h3>
                <input type="text" id="edit-hero-title" placeholder="Título" class="w-full border p-2 mb-2 rounded-lg text-sm">
                <input type="file" id="hero-img-input" class="text-xs mb-2">
                <button onclick="uploadAndSetHero()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">Guardar Portada</button>
            </div>
            <div>
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-2">Nueva Sesión</h3>
                <input type="text" id="new-loc" placeholder="Ubicación" class="w-full border p-2 mb-2 rounded-lg text-sm">
                <input type="file" id="session-cover-input" class="text-xs mb-2">
                <button onclick="createSessionWithFile()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg">Publicar</button>
            </div>
        </div>
    </div>

    <section id="sessions-page" class="hidden flex-grow p-6">
        <main class="max-w-6xl mx-auto">
            <div id="sessions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
            
            <div id="view-gallery" class="hidden">
                <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold">← Back</button>
                <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
                <div id="admin-upload-area" class="hidden bg-blue-50 p-6 rounded-2xl mb-8 border-dashed border-2 border-blue-200 text-center">
                    <input type="file" id="bulk-files" multiple class="hidden" onchange="handleBulkUpload(event)">
                    <label for="bulk-files" class="bg-blue-600 text-white px-6 py-3 rounded-full cursor-pointer font-bold">SUBIR FOTOS</label>
                    <div id="progress-container" class="hidden mt-4"><div class="w-full bg-gray-200 h-2 rounded-full"><div id="progress-bar" class="bg-blue-600 h-full rounded-full" style="width:0%"></div></div></div>
                </div>
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </main>
    </section>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-6 text-white text-5xl">❮</button>
        <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-xl">
        <button onclick="nextPhoto()" class="absolute right-6 text-white text-5xl">❯</button>
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-3xl">✕</button>
    </div>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU');
        let isAdmin = false, currentSessionId = null, currentPhotos = [], currentIndex = 0;

        async function init() {
            await loadSiteSettings();
            await checkUser();
            await loadSessions();
        }

        async function uploadAndSetHero() {
            const file = document.getElementById('hero-img-input').files[0];
            const { data } = await client.storage.from('clips').upload(`hero/${Date.now()}.jpg`, file);
            const url = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${data.path}`;
            await client.from('site_settings').update({ hero_title: document.getElementById('edit-hero-title').value, hero_bg_url: url }).eq('id', 'main');
            location.reload();
        }

        async function handleBulkUpload(event) {
            const files = Array.from(event.target.files);
            document.getElementById('progress-container').classList.remove('hidden');
            let count = 0;
            for (let file of files) {
                const path = `watermarked/${Date.now()}-${file.name}`;
                await client.storage.from('clips').upload(path, file);
                const url = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${path}`;
                await client.from('photos').insert([{ session_id: currentSessionId, url_watermarked: url, url_original: url }]);
                count++;
                document.getElementById('progress-bar').style.width = `${(count/files.length)*100}%`;
            }
            alert("¡Subida completada!");
            location.reload();
        }

        function exitAdmin() { isAdmin = false; document.getElementById('admin-panel').classList.add('hidden'); }
        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") { isAdmin = true; document.getElementById('admin-panel').classList.remove('hidden'); }
        }

        // --- Funciones de navegación y carga básica (idénticas a las anteriores) ---
        function backToHome() { document.getElementById('hero-section').classList.remove('hidden'); document.getElementById('sessions-page').classList.add('hidden'); }
        function goToSessions() { document.getElementById('hero-section').classList.add('hidden'); document.getElementById('sessions-page').classList.remove('hidden'); }
        
        init();
    </script>
</body>
</html>
