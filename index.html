<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>.hero-bg { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/hero-default.jpg'); background-size: cover; background-position: center; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col relative">

    <section id="landing-page" class="hero-bg h-screen flex flex-col items-center justify-center text-center p-6 text-white">
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl">
            <h1 class="font-black italic text-2xl">BYRON SURF CLIPS</h1>
            <div class="flex gap-6 font-bold text-sm">
                <button onclick="goToSessions()" class="hover:text-blue-400">FIND MY SHOT</button>
                <button onclick="showPacks()" class="hover:text-blue-400">PACKS</button>
            </div>
        </nav>
        <h1 class="text-6xl font-black italic mb-6">CAPTURE THE WAVE</h1>
        <p class="text-xl mb-10 max-w-lg opacity-90">Professionals capturing the exact moment.</p>
        <button onclick="goToSessions()" class="bg-blue-600 px-10 py-4 rounded-full font-bold text-lg hover:bg-blue-500 transition">View Sessions</button>
    </section>

    <section id="sessions-page" class="hidden flex-grow pt-10">
        <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-2xl sticky top-4 z-40">
            <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex items-center gap-4">
                <div id="auth-ui" class="flex gap-2">
                    <input type="email" id="email" placeholder="Admin Email" class="border p-1 rounded text-xs w-24">
                    <input type="password" id="pass" placeholder="Password" class="border p-1 rounded text-xs w-24">
                    <button onclick="login()" class="bg-gray-900 text-white px-2 py-1 rounded text-xs font-bold">Login</button>
                </div>
                <button onclick="toggleCartModal()" class="font-bold text-blue-600">🛒 Cart (<span id="cart-count">0</span>)</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-4">
            
            <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-8 border-2 border-dashed border-blue-300">
                <h2 class="font-bold mb-4 text-blue-800">Admin: Create New Session</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="loc" placeholder="Location (e.g., The Pass)" class="border p-2 rounded-lg text-sm">
                    <input type="text" id="time_range" placeholder="Time range (e.g., 07:00 - 09:00 AM)" class="border p-2 rounded-lg text-sm">
                    <input type="date" id="date" class="border p-2 rounded-lg text-sm">
                    <button onclick="createSession()" class="bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-500">Publish Session</button>
                </div>
            </section>

            <div id="sessions-grid-container">
                <section class="bg-white p-4 rounded-2xl shadow-sm mb-8 flex gap-4 flex-wrap">
                    <input type="text" id="filter-loc" placeholder="Filter by location..." class="border p-2 rounded-lg flex-1" onkeyup="filterSessions()">
                    <input type="date" id="filter-date" class="border p-2 rounded-lg" onchange="filterSessions()">
                </section>
                <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
            
            <div id="view-gallery" class="hidden">
                <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold hover:underline">← Back to Sessions</button>
                <h2 id="gallery-header" class="text-3xl font-black mb-8"></h2>
                
                <div id="admin-upload" class="hidden bg-blue-50 p-8 rounded-3xl mb-10 text-center border-2 border-dashed border-blue-200">
                    <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                    <label for="bulk-upload" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Bulk Upload Photos</label>
                </div>
                
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>
        </main>
    </section>

    <section id="packs-page" class="hidden flex-grow pt-20 p-6">
        <h2 class="text-4xl font-black text-center mb-10">Photo Packs</h2>
        <div id="packs-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto"></div>
        <button onclick="backToHome()" class="mt-10 block mx-auto text-blue-600 font-bold hover:underline">← Back Home</button>
    </section>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Your Cart</h2>
                <button onclick="toggleCartModal()" class="text-2xl font-bold">✕</button>
            </div>
            <div id="cart-items" class="grid grid-cols-2 gap-2 flex-grow content-start"></div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-6 hover:bg-blue-700">Proceed to Checkout</button>
        </div>
    </div>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-4 text-white text-5xl hover:text-gray-300">❮</button>
        <div class="relative">
            <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-lg">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
        </div>
        <button onclick="nextPhoto()" class="absolute right-4 text-white text-5xl hover:text-gray-300">❯</button>
        <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300">✕</button>
    </div>

    <footer class="bg-white border-t mt-auto py-8 text-center text-gray-500 text-sm">
        <p>© 2026 Byron Surf Clips. All rights reserved.</p>
    </footer>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'YOUR_ANON_KEY'); // <-- PON TU KEY AQUÍ
        let sessions = [], currentPhotos = [], cart = [], currentIndex = 0;
        let currentSessionId = null;
        let isAdmin = false;
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";

        // INIT
        checkUser();

        // NAVIGATION
        function hideAll() { 
            document.getElementById('landing-page').classList.add('hidden'); 
            document.getElementById('sessions-page').classList.add('hidden'); 
            document.getElementById('packs-page').classList.add('hidden'); 
        }
        function goToSessions() { hideAll(); document.getElementById('sessions-page').classList.remove('hidden'); showSessions(); loadSessions(); }
        function showPacks() { hideAll(); document.getElementById('packs-page').classList.remove('hidden'); loadPacks(); }
        function backToHome() { hideAll(); document.getElementById('landing-page').classList.remove('hidden'); }
        
        // CORRECCIÓN: Volver de galería a cuadrícula de sesiones
        function showSessions() { 
            document.getElementById('view-gallery').classList.add('hidden'); 
            document.getElementById('sessions-grid-container').classList.remove('hidden'); 
        }

        // AUTH & ADMIN
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const { error } = await client.auth.signInWithPassword({ email, password });
            if (!error) { alert("Logged in successfully!"); checkUser(); } else { alert(error.message); }
        }
        async function logout() { await client.auth.signOut(); location.reload(); }
        
        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                if(document.getElementById('admin-upload')) document.getElementById('admin-upload').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-xs text-green-600 font-bold self-center">ADMIN</span> <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline">Logout</button>`;
            }
        }

        // SESSIONS
        async function loadSessions() { 
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false }); 
            sessions = data || []; 
            renderSessions(sessions); 
        }
        
        function renderSessions(list) { 
            document.getElementById('sessions-grid').innerHTML = list.map(s => `
                <div class="bg-white rounded-3xl shadow-sm border cursor-pointer hover:shadow-md transition" onclick="openGallery('${s.id}', '${s.location}')">
                    <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-48 object-cover rounded-t-3xl">
                    <div class="p-5">
                        <h3 class="font-black text-xl">${s.location}</h3>
                        <p class="text-blue-600 text-sm font-bold">${s.time_range || 'Time not specified'}</p>
                        <p class="text-gray-500 text-sm">${s.date || ''}</p>
                    </div>
                </div>`).join(''); 
        }

        function filterSessions() {
            const loc = document.getElementById('filter-loc').value.toLowerCase();
            const date = document.getElementById('filter-date').value;
            renderSessions(sessions.filter(s => s.location.toLowerCase().includes(loc) && (!date || s.date === date)));
        }

        async function createSession() {
            if(!isAdmin) return;
            const location = document.getElementById('loc').value;
            const time_range = document.getElementById('time_range').value;
            const date = document.getElementById('date').value;
            const { error } = await client.from('sessions').insert([{ location, time_range, date }]);
            if (!error) { alert("Session published!"); loadSessions(); }
        }

        // GALLERY & PHOTOS
        function openGallery(id, title) { 
            currentSessionId = id; 
            document.getElementById('sessions-grid-container').classList.add('hidden'); 
            document.getElementById('view-gallery').classList.remove('hidden'); 
            document.getElementById('gallery-header').innerText = title; 
            if(isAdmin) document.getElementById('admin-upload').classList.remove('hidden');
            loadPhotos(); 
        }

        async function loadPhotos() { 
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId); 
            currentPhotos = data || []; 
            document.getElementById('photos-grid').innerHTML = currentPhotos.map((p, i) => `
                <div class="relative rounded-2xl overflow-hidden aspect-square border-2 border-transparent">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox(${i})">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                    <input type="checkbox" class="absolute top-3 left-3 w-6 h-6 z-10 cursor-pointer shadow-sm" onchange="toggleCart('${p.url_watermarked}', this)" ${cart.includes(p.url_watermarked) ? 'checked' : ''}>
                </div>`).join(''); 
        }

        // ADMIN: UPLOAD PHOTOS
        async function handleBulkUpload(event) {
            if(!isAdmin) return;
            const files = event.target.files;
            if (files.length === 0) return;
            alert(`Uploading ${files.length} photos... Please wait.`);
            for (let file of files) {
                const fileName = `${Date.now()}-${file.name}`;
                const { data, error } = await client.storage.from('clips').upload(`watermarked/${fileName}`, file);
                if (data) {
                    const url = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermarked/${fileName}`;
                    await client.from('photos').insert([{ session_id: currentSessionId, url_watermarked: url, url_original: url }]);
                }
            }
            alert("Upload complete!");
            loadPhotos();
        }

        // LIGHTBOX
        function openLightbox(i) { currentIndex = i; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; document.getElementById('lightbox').classList.remove('hidden'); }
        function nextPhoto() { currentIndex = (currentIndex + 1) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function prevPhoto() { currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length; document.getElementById('lightbox-img').src = currentPhotos[currentIndex].url_watermarked; }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }

        // CART & CHECKOUT
        function toggleCart(url, el) { 
            if(el.checked) cart.push(url); else cart = cart.filter(i => i !== url); 
            document.getElementById('cart-count').innerText = cart.length; 
            renderCart();
        }
        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); renderCart(); }
        function renderCart() { 
            document.getElementById('cart-items').innerHTML = cart.map(url => `
                <div class="relative rounded-lg overflow-hidden aspect-square border">
                    <img src="${url}" class="w-full h-full object-cover">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                </div>
            `).join(''); 
        }

        async function checkout() { 
            if(cart.length === 0) return alert("Your cart is empty!");
            const response = await fetch('https://gmyptbfrpspzmyucqumz.supabase.co/functions/v1/swift-api', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdteXB0YmZycHNwem15dWNxdW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NTg5NDIsImV4cCI6MjA4ODUzNDk0Mn0.1GvxHkh1Uzkh0GWlllG1KYds2jXGTtHjUUkR6XUTmqU' }, // <-- PON TU KEY AQUÍ TAMBIÉN
                body: JSON.stringify({ photos: cart }) 
            });
            const data = await response.json();
            if (data.url) window.location.href = data.url; else alert("Error creating checkout session.");
        }

        // PACKS
        async function loadPacks() {
            const { data } = await client.from('packs').select('*').order('id');
            document.getElementById('packs-container').innerHTML = data.map(p => `
                <div class="bg-[#1a2432] border border-gray-700 p-8 rounded-3xl text-center shadow-lg hover:border-blue-500 transition-all">
                    <h3 class="text-2xl font-bold text-white">${p.name}</h3>
                    <p class="text-gray-400 text-sm mt-2">${p.photos_count} photos</p>
                    <p class="text-4xl font-black text-white my-6">$${p.price} <span class="text-sm font-normal text-gray-400">AUD</span></p>
                    <button onclick="goToSessions()" class="bg-blue-600 hover:bg-blue-500 text-white w-full py-3 rounded-full font-bold transition">Choose Photos</button>
                </div>`).join('');
        }
    </script>
</body>
</html>
