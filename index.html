<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips | Capture the Wave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col font-sans">

    <section id="hero-section" class="h-screen flex flex-col items-center justify-center text-center p-6 text-white relative">
        <div class="absolute inset-0 hero-gradient"></div>
        <nav class="absolute top-0 w-full p-6 flex justify-between items-center max-w-6xl z-10">
            <h1 class="font-black italic text-2xl tracking-tighter cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex gap-8 font-bold text-sm uppercase tracking-widest">
                <button onclick="goToSessions()" class="hover:text-blue-400 transition">Sessions</button>
                <button onclick="showPacks()" class="hover:text-blue-400 transition">Packs</button>
            </div>
        </nav>
        <div class="z-10">
            <h1 id="hero-title" class="text-6xl md:text-8xl font-black italic mb-4 tracking-tighter uppercase leading-none">LOADING...</h1>
            <p id="hero-subtitle" class="text-lg md:text-2xl mb-10 max-w-2xl opacity-90 font-medium mx-auto"></p>
            <button onclick="goToSessions()" class="bg-blue-600 px-14 py-5 rounded-full font-black text-lg hover:bg-blue-500 transition shadow-2xl">FIND MY SHOTS</button>
        </div>
    </section>

    <section id="sessions-page" class="hidden flex-grow pt-10 px-4 pb-20">
        <nav class="max-w-6xl mx-auto flex justify-between items-center mb-10 bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100">
            <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="backToHome()">BYRON SURF CLIPS</h1>
            <div class="flex items-center gap-6">
                <div id="auth-ui" class="flex gap-2">
                    <input type="email" id="login-email" placeholder="Email" class="border p-2 px-4 rounded-xl text-xs w-40 outline-none">
                    <button onclick="login()" class="bg-gray-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-gray-700">Login</button>
                </div>
                <button onclick="toggleCartModal()" class="font-bold text-blue-600 flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                    🛒 <span id="cart-count">0</span>
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto">
            <div id="admin-panel" class="hidden bg-white p-8 rounded-[2.5rem] shadow-lg border-2 border-blue-100 mb-12 relative">
                <button onclick="exitAdmin()" class="absolute top-6 right-6 text-red-500 font-bold text-xs uppercase tracking-widest">Exit Admin</button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <h3 class="font-black text-gray-400 text-[10px] uppercase">1. Site Design</h3>
                        <input type="text" id="edit-hero-title" placeholder="Title" class="w-full border p-3 rounded-xl text-sm">
                        <input type="text" id="edit-hero-subtitle" placeholder="Subtitle" class="w-full border p-3 rounded-xl text-sm">
                        <input type="file" id="edit-hero-bg-file" class="text-xs">
                        <button onclick="updateSiteSettings()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">Update Site</button>
                    </div>
                    <div class="space-y-4">
                        <h3 class="font-black text-gray-400 text-[10px] uppercase">2. New Session</h3>
                        <input type="text" id="new-loc" placeholder="Location" class="w-full border p-3 rounded-xl text-sm">
                        <input type="date" id="new-date" class="w-full border p-3 rounded-xl text-sm">
                        <input type="file" id="new-cover-file" class="text-xs">
                        <button onclick="createSession()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl">Publish</button>
                    </div>
                </div>
            </div>

            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10"></div>
            <div id="view-gallery" class="hidden">
                <div class="flex items-center gap-4 mb-10">
                    <button onclick="showSessions()" class="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md transition text-blue-600 font-bold">← BACK</button>
                    <h2 id="gallery-header" class="text-4xl font-black italic text-gray-900"></h2>
                </div>
                <div id="admin-upload-area" class="hidden bg-blue-50 p-10 rounded-[2.5rem] mb-12 text-center border-4 border-dashed border-blue-200">
                    <input type="file" id="bulk-files" multiple class="hidden" onchange="handleBulkUpload(event)">
                    <label for="bulk-files" class="bg-blue-600 text-white px-10 py-5 rounded-full font-black cursor-pointer">UPLOAD PHOTOS</label>
                    <div id="upload-progress-container" class="hidden mt-8 max-w-md mx-auto">
                        <div class="w-full bg-blue-200 rounded-full h-3 overflow-hidden"><div id="progress-bar" class="bg-blue-600 h-full w-0"></div></div>
                    </div>
                </div>
                <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>
        </main>

        <footer class="mt-20 py-10 text-center border-t">
            <p class="text-gray-400 text-xs font-bold">© BYRON SURF CLIPS | @byron.surf.clips</p>
        </footer>
    </section>

    <section id="packs-page" class="hidden flex-grow pt-24 p-6 bg-gray-900 text-white">
        <div id="packs-container" class="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-6xl mx-auto"></div>
        <button onclick="backToHome()" class="mt-20 block mx-auto text-blue-400 font-bold uppercase underline">Exit</button>
    </section>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-8 flex flex-col">
            <h2 class="text-3xl font-black mb-10 italic">CART</h2>
            <div id="cart-items" class="grid grid-cols-2 gap-4 flex-grow content-start overflow-y-auto"></div>
            <button id="checkout-btn" onclick="checkout()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl mt-6">Stripe Checkout</button>
            <button onclick="toggleCartModal()" class="mt-4 text-gray-400 text-xs font-bold uppercase">Close</button>
        </div>
    </div>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-4">
        <button onclick="prevPhoto()" class="absolute left-6 text-white text-5xl">❮</button>
        <div class="relative"><img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-xl"><img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none object-contain"></div>
        <button onclick="nextPhoto()" class="absolute right-6 text-white text-5xl">❯</button>
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-3xl">✕</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
