<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl sticky top-0 z-40">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div class="flex items-center gap-4">
            <button onclick="toggleCartModal()" class="relative font-bold hover:text-blue-600">
                🛒 Cart (<span id="cart-count">0</span>)
            </button>
            <div id="auth-ui" class="flex items-center gap-2">
                <input type="email" id="email" placeholder="Email" class="border p-1 rounded text-xs w-20">
                <input type="password" id="pass" placeholder="Password" class="border p-1 rounded text-xs w-20">
                <button onclick="login()" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-blue-700">Login</button>
            </div>
        </div>
    </nav>

    <div id="cart-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex justify-end">
        <div class="bg-white w-full max-w-sm p-6 overflow-y-auto shadow-2xl">
            <div class="flex justify-between mb-6">
                <h2 class="font-black text-xl text-gray-800">Your Selection</h2>
                <button onclick="toggleCartModal()" class="text-2xl hover:text-red-500">✕</button>
            </div>
            <div id="cart-items" class="grid grid-cols-2 gap-2 mb-6"></div>
            <div id="cart-empty-msg" class="text-center py-10 text-gray-400 hidden">Your cart is empty</div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4">
        <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
            <h2 class="font-bold mb-4 text-blue-800 flex items-center gap-2">
                <span class="bg-blue-100 p-1 rounded">🛠️</span> Create New Session
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="loc" placeholder="Location (e.g. The Pass)" class="border p-3 rounded-xl text-sm outline-none focus:ring-2 ring-blue-500">
                <input type="text" id="time_range" placeholder="Time (e.g. 6am - 9am)" class="border p-3 rounded-xl text-sm outline-none focus:ring-2 ring-blue-500">
                <input type="date" id="date" class="border p-3 rounded-xl text-sm outline-none focus:ring-2 ring-blue-500">
                <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Publish Session</button>
            </div>
        </section>

        <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-6 text-blue-600 font-bold hover:underline flex items-center gap-2">
                ← Back to Sessions
            </button>
            <h2 id="gallery-header" class="text-4xl font-black mb-8 text-gray-900"></h2>
            
            <div id="admin-upload" class="hidden bg-blue-50 p-10 rounded-3xl mb-10 text-center border-2 border-dashed border-blue-200">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold cursor-pointer hover:bg-blue-700 transition-all inline-block shadow-md">
                    Bulk Upload Photos
                </label>
                <p class="text-xs text-blue-400 mt-4">Images will be automatically watermarked</p>
            </div>
            
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-4" onclick="closeLightbox()">
        <div class="relative max-w-5xl w-full">
            <img id="lightbox-img" class="w-full max-h-[90vh] object-contain rounded-lg shadow-2xl">
            <img src="https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png" class="absolute inset-0 w-full h-full opacity-40 pointer-events-none object-contain">
            <button class="absolute top-4 right-4 text-white text-3xl font-light">✕</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN INICIAL
        const stripe = Stripe('pk_live_51T8tlD9JfPnTFk2BLILCOhmNYqF33kkEHVToXWOmJll825wYNZWrAWy19vKnCW1NexFNBzai29jKz0uSCKpnMnpo00w2HXIlUI');
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false, currentSessionId = null, cart = [];
        const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";

        // GESTIÓN DE USUARIO
        async function login() {
            const { error } = await client.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('pass').value });
            if (error) alert(error.message); else location.reload();
        }
        async function logout() { await client.auth.signOut(); location.reload(); }
        
        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            if (user?.email === "wildpauu@gmail.com") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('auth-ui').innerHTML = `<span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">ADMIN</span> <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline">Logout</button>`;
            }
            loadSessions();
        }

        // PASARELA DE PAGO (CORS READY)
        async function checkout() {
            if (cart.length === 0) return alert("Please select at least one photo.");
            try {
                const response = await fetch('https://gmyptbfrpspzmyucqumz.supabase.co/functions/v1/swift-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ photos: cart }) 
                });
                const data = await response.json();
                if (data.url) window.location.href = data.url; else throw new Error(data.error || "Server error");
            } catch (e) {
                alert("Error: " + e.message + ". Make sure Edge Function is deployed and CORS is enabled.");
            }
        }

        // LÓGICA DE SESIONES
        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            document.getElementById('sessions-grid').innerHTML = (data || []).map(s => `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100 hover:shadow-xl transition-all group">
                    <div class="cursor-pointer" onclick="openGallery('${s.id}', '${s.location}')">
                        <div class="relative overflow-hidden">
                            <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f'}" class="w-full h-56 object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <h3 class="absolute bottom-4 left-5 font-black text-2xl text-white">${s.location}</h3>
                        </div>
                        <div class="p-5 flex justify-between items-center">
                            <p class="text-gray-500 font-medium">${s.date || 'No date'} • ${s.time_range || 'All day'}</p>
                            <span class="text-blue-600 font-bold text-sm">View Clips →</span>
                        </div>
                    </div>
                    ${isAdmin ? `<button onclick="updateCover('${s.id}')" class="w-full py-3 text-xs text-blue-600 border-t bg-gray-50 font-bold hover:bg-blue-50 transition-colors">Change Cover Image</button>` : ''}
                </div>
            `).join('');
        }

        async function createSession() {
            const { error } = await client.from('sessions').insert([{
                location: document.getElementById('loc').value,
                time_range: document.getElementById('time_range').value,
                date: document.getElementById('date').value
            }]);
            if (error) alert(error.message); else location.reload();
        }

        async function updateCover(id) {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const path = `covers/${Date.now()}_${file.name}`;
                await client.storage.from('clips').upload(path, file);
                const { data: { publicUrl } } = client.storage.from('clips').getPublicUrl(path);
                await client.from('sessions').update({ cover_url: publicUrl }).eq('id', id);
                location.reload();
            }; input.click();
        }

        // GESTIÓN DEL CARRITO
        function toggleCartModal() { 
            document.getElementById('cart-modal').classList.toggle('hidden'); 
            renderCart(); 
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const msg = document.getElementById('cart-empty-msg');
            if (cart.length === 0) { msg.classList.remove('hidden'); container.innerHTML = ""; }
            else {
                msg.classList.add('hidden');
                container.innerHTML = cart.map(url => `
                    <div class="relative rounded-xl overflow-hidden aspect-square border shadow-inner group">
                        <img src="${url}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent"></div>
                    </div>
                `).join('');
            }
        }

        function toggleCart(url, cb) {
            if (cb.checked) cart.push(url); else cart = cart.filter(i => i !== url);
            document.getElementById('cart-count').innerText = cart.length;
        }

        // GESTIÓN DE FOTOS
        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative rounded-2xl overflow-hidden aspect-square border-2 border-transparent hover:border-blue-500 transition-all group shadow-sm">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover cursor-pointer" onclick="openLightbox('${p.url_watermarked}')">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                    <div class="absolute top-2 left-2 bg-white/80 backdrop-blur rounded-lg p-1">
                        <input type="checkbox" class="w-5 h-5 cursor-pointer accent-blue-600" onchange="toggleCart('${p.url_watermarked}', this)">
                    </div>
                </div>
            `).join('');
        }

        async function handleBulkUpload(e) {
            for (let file of e.target.files) {
                const name = `${Date.now()}_${file.name.replace(/\s/g, "_")}`;
                await client.storage.from('clips').upload(`originals/${name}`, file);
                await client.storage.from('clips').upload(`watermarked/${name}`, file);
                const urlOriginal = client.storage.from('clips').getPublicUrl(`originals/${name}`).data.publicUrl;
                const urlWatermarked = client.storage.from('clips').getPublicUrl(`watermarked/${name}`).data.publicUrl;
                await client.from('photos').insert([{ session_id: currentSessionId, url_original: urlOriginal, url_watermarked: urlWatermarked }]);
            }
            loadPhotos();
        }

        function openGallery(id, title) {
            currentSessionId = id;
            document.getElementById('sessions-grid').classList.add('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerText = title;
            if (isAdmin) document.getElementById('admin-upload').classList.remove('hidden');
            loadPhotos();
        }

        function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.remove('hidden'); }
        function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
        function showSessions() { location.reload(); }

        checkUser();
    </script>
</body>
</html>
