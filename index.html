<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Byron Surf Clips</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui" class="flex items-center"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="view-sessions">
            <section id="admin-panel" class="hidden bg-white p-6 rounded-2xl shadow-sm mb-10 border-2 border-dashed border-blue-200">
                <h2 class="font-bold mb-4 text-blue-800">Crear Nueva Sesión (Admin)</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="loc" placeholder="Ubicación" class="border p-2 rounded-lg text-sm">
                    <input type="text" id="time" placeholder="Horario" class="border p-2 rounded-lg text-sm">
                    <input type="date" id="date" class="border p-2 rounded-lg text-sm">
                    <button onclick="createSession()" class="bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Publicar</button>
                </div>
            </section>
            <div id="sessions-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-6 flex items-center text-blue-600 font-bold hover:underline">← Volver</button>
            <div id="gallery-header" class="mb-8"></div>
            <div id="admin-upload" class="hidden bg-blue-50 p-8 rounded-3xl mb-10 text-center border-2 border-blue-200 border-dashed">
                <input type="file" id="bulk-upload" multiple class="hidden" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-blue-700">Subir Fotos</label>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let isAdmin = false;
        let currentSessionId = null;

        async function checkUser() {
            const { data: { user } } = await client.auth.getUser();
            isAdmin = (user?.email === "wildpauu@gmail.com");
            const authDiv = document.getElementById('auth-ui');
            if (isAdmin) {
                authDiv.innerHTML = `<span class="bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full mr-3 shadow">MODO ADMIN</span><button onclick="logout()" class="text-xs text-gray-500 underline font-bold">Salir</button>`;
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                authDiv.innerHTML = `<span class="bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full mr-3 shadow">MODO INVITADO</span><button onclick="login()" class="text-sm bg-blue-100 text-blue-700 px-4 py-1 rounded-full font-bold">Admin Login</button>`;
                document.getElementById('admin-panel').classList.add('hidden');
            }
            loadSessions();
        }

        async function logout() { await client.auth.signOut(); localStorage.removeItem('sb-gmyptbfrpspzmyucqumz-auth-token'); window.location.reload(); }
        async function login() { const email = prompt("Email de Admin:"); if(!email) return; await client.auth.signInWithOtp({ email }); alert("Revisa tu email."); }
        async function createSession() { const loc = document.getElementById('loc').value; const date = document.getElementById('date').value; if(!loc || !date) return alert("Falta Ubicación o Fecha"); await client.from('sessions').insert([{ location: loc, time_range: document.getElementById('time').value, date: date }]); location.reload(); }
        async function deleteSession(id) { if (!confirm("¿Borrar sesión?")) return; await client.from('sessions').delete().eq('id', id); location.reload(); }

        async function loadSessions() {
            const { data } = await client.from('sessions').select('*').order('date', { ascending: false });
            document.getElementById('sessions-grid').innerHTML = (data || []).map(s => `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100 relative group">
                    <div onclick="openGallery('${s.id}', '${s.location}')" class="cursor-pointer">
                        <img src="${s.cover_url || 'https://images.unsplash.com/photo-1502680390469-be75c86b636f?w=600'}" class="w-full h-48 object-cover group-hover:scale-105 transition duration-500">
                        <div class="p-5"><h3 class="font-black text-xl text-gray-800">${s.location}</h3>
                        <div class="flex justify-between mt-3 text-sm font-bold text-gray-500 border-t pt-3"><span>📅 ${s.date}</span><span>⏰ ${s.time_range || 'Todo el día'}</span></div></div>
                    </div>
                    ${isAdmin ? `<div class="absolute top-3 right-3 flex flex-col gap-2"><label class="bg-black/70 text-white px-3 py-1 rounded-lg text-xs cursor-pointer shadow-lg">Editar Portada <input type="file" class="hidden" onchange="updateCover('${s.id}', event)"></label><button onclick="deleteSession('${s.id}')" class="bg-red-600 text-white px-3 py-1 rounded-lg text-xs shadow-lg">Borrar</button></div>` : ''}
                </div>
            `).join('');
        }

        async function updateCover(sessionId, event) {
            const file = event.target.files[0];
            if (!file) return;
            const filePath = `covers/${sessionId}_${Date.now()}`;
            await client.storage.from('clips').upload(filePath, file);
            const publicUrl = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${filePath}`;
            await client.from('sessions').update({ cover_url: publicUrl }).eq('id', sessionId);
            loadSessions();
        }

        function openGallery(id, title) {
            currentSessionId = id;
            document.getElementById('view-sessions').classList.add('hidden');
            document.getElementById('view-gallery').classList.remove('hidden');
            document.getElementById('gallery-header').innerHTML = `<h2 class="text-3xl font-black text-blue-900">${title}</h2>`;
            if (isAdmin) document.getElementById('admin-upload').classList.remove('hidden');
            loadPhotos();
        }

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative group rounded-2xl overflow-hidden shadow-md aspect-square bg-gray-200">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex flex-col items-center justify-center p-4">
                        <button onclick="window.open('https://stripe.com', '_blank')" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm shadow-xl hover:scale-105 transition">Comprar $5</button>
                        ${isAdmin ? `<button onclick="deletePhoto('${p.id}')" class="mt-4 text-xs text-red-200 underline">Borrar</button>` : ''}
                    </div>
                </div>
            `).join('') || '<p class="col-span-full text-center py-10 text-gray-400">No hay fotos aún.</p>';
        }

        async function handleBulkUpload(event) {
            const files = event.target.files;
            if (!files.length || !currentSessionId) return;
            alert("Subiendo...");
            for (let file of files) {
                const cleanName = file.name.replace(/[^a-zA-Z0-9.]/g, "_");
                const filePath = `photos/${currentSessionId}/${Date.now()}_${cleanName}`;
                await client.storage.from('clips').upload(filePath, file);
                const publicUrl = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${filePath}`;
                await client.from('photos').insert([{ session_id: currentSessionId, url_original: publicUrl, url_watermarked: publicUrl }]);
            }
            loadPhotos();
        }

        async function deletePhoto(photoId) { if (confirm("¿Borrar?")) { await client.from('photos').delete().eq('id', photoId); loadPhotos(); } }
        function showSessions() { document.getElementById('view-sessions').classList.remove('hidden'); document.getElementById('view-gallery').classList.add('hidden'); }
        checkUser();
    </script>
</body>
</html>
