<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Byron Surf Clips</title>
</head>
<body class="bg-gray-100">

    <nav class="bg-white p-4 shadow-md flex justify-between items-center max-w-6xl mx-auto mb-6 rounded-b-2xl">
        <h1 class="font-black italic text-2xl text-blue-900 cursor-pointer" onclick="location.reload()">BYRON SURF CLIPS</h1>
        <div id="auth-ui"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div id="view-sessions"><div id="sessions-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></div>
        
        <div id="view-gallery" class="hidden">
            <button onclick="showSessions()" class="mb-4 text-blue-600 font-bold">← Volver</button>
            <div id="gallery-header" class="mb-8"></div>
            <div id="admin-upload" class="hidden mb-10"><input type="file" id="bulk-upload" multiple onchange="handleBulkUpload(event)"></div>
            <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <script>
        const client = supabase.createClient('https://gmyptbfrpspzmyucqumz.supabase.co', 'sb_publishable_ZHZEWqDDkHjnhUwTezQ9cw__1xzvrUv');
        let currentSessionId = null;

        async function loadPhotos() {
            const { data } = await client.from('photos').select('*').eq('session_id', currentSessionId);
            // URL de tu marca de agua subida a Supabase
            const wmUrl = "https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/watermark.png";
            
            document.getElementById('photos-grid').innerHTML = (data || []).map(p => `
                <div class="relative aspect-square bg-gray-200 rounded-xl overflow-hidden">
                    <img src="${p.url_watermarked}" class="w-full h-full object-cover">
                    <img src="${wmUrl}" class="absolute inset-0 w-full h-full object-cover pointer-events-none opacity-50">
                    <div class="absolute inset-0 flex items-end p-2">
                        <button onclick="window.open('https://stripe.com', '_blank')" class="bg-white w-full py-1 rounded-lg text-xs font-bold">COMPRAR</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleBulkUpload(event) {
            const files = event.target.files;
            for (let file of files) {
                const name = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
                await client.storage.from('clips').upload(name, file);
                const url = `https://gmyptbfrpspzmyucqumz.supabase.co/storage/v1/object/public/clips/${name}`;
                await client.from('photos').insert([{ session_id: currentSessionId, url_original: url, url_watermarked: url }]);
            }
            loadPhotos();
        }

        // ... funciones auxiliares (loadSessions, showSessions) igual que antes ...
        function showSessions() { document.getElementById('view-sessions').classList.remove('hidden'); document.getElementById('view-gallery').classList.add('hidden'); }
    </script>
</body>
</html>
